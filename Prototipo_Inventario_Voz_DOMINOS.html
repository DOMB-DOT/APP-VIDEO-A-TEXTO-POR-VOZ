function norm(s){return (s||"").toString().toUpperCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^A-Z0-9 ]/g," ").replace(/\s+/g," ").trim();}
function toks(s){return norm(s).split(" ").filter(w=>w&&!STOP.has(w));}
function matOf(s){const n=norm(s);for(const m of MATS)if(n.includes(m))return m;return "";}
function score(said,item){
  const a=new Set(toks(said)), b=new Set([...toks(item.clave),...toks(item.desc)]);
  let ov=0;a.forEach(w=>{if(b.has(w))ov++;});
  const cover=a.size? 100*ov/a.size : 0;
  const cover2=b.size?100*ov/b.size:0;
  let sc=0.6*cover+0.4*cover2;
  // candado material
  const ms=matOf(said), mi=matOf(item.desc);
  if(ms&&mi&&ms!==mi) sc-=45;      // material distinto: castigo fuerte
  if(ms&&mi&&ms===mi) sc+=10;      // material coincide: premio
  return Math.max(0,Math.min(100,Math.round(sc)));
}
const areaSel=document.getElementById("area");
[...new Set(DATA.items.map(i=>i.area))].sort().forEach(a=>{const o=document.createElement("option");o.textContent=a;areaSel.value=o.value=a;areaSel.appendChild(o);});
let confirmed=[];
function render(said){
  const heard=document.getElementById("heard");
  if(!said.trim()){heard.textContent="Esperando que hables…";document.getElementById("result").innerHTML="";return;}
  heard.innerHTML="Escuché: <b>"+said+"</b>";
  const area=areaSel.value;
  let pool=DATA.items.filter(i=>i.area===area);
  if(pool.length===0)pool=DATA.items;
  const ranked=pool.map(i=>({i,s:score(said,i)})).sort((a,b)=>b.s-a.s).slice(0,4);
  const top=ranked[0];
  const col=top.s>=70?"var(--ok)":top.s>=50?"var(--warn)":"var(--bad)";
  let alts=ranked.slice(1).map(r=>`<div>${r.i.clave} · <span style="color:var(--mut)">${r.s}%</span></div>`).join("");
  let html=`<div class="card">
    <span class="pill" style="background:${col}">${top.s}% confianza</span>
    <div class="big">${top.s>=50?top.i.clave:"⚠ Sin coincidencia clara"}</div>
    <div class="desc">${top.i.desc}</div>
    <div class="meta">Área: ${top.i.area} · Cat: ${top.i.cat} · Esperado: ${top.i.cant}</div>
    <div class="btns">
      <button class="confirm" onclick="confirmIt('${top.i.id}','${top.i.clave.replace(/'/g,"")}')">✓ Confirmar</button>
      <button class="skip" onclick="markNew()">+ Activo nuevo</button>
    </div>
    <div class="alt"><b style="color:var(--mut)">Otras opciones:</b>${alts||"<div>—</div>"}</div>
  </div>`;
  document.getElementById("result").innerHTML=html;
}
function confirmIt(id,clave){confirmed.push(clave);updLog(clave,"confirmado");}
function markNew(){const s=document.getElementById("manual").value||"(hablado)";updLog(s,"NUEVO / no esperado");}
function updLog(txt,est){
  const l=document.getElementById("log");
  const d=document.createElement("div");d.className="logitem";
  d.innerHTML=`<span>${txt}</span><span class="c">${est}</span>`;l.prepend(d);
  document.getElementById("count").textContent="Registrados en esta sesión: "+ (l.children.length);
}
document.getElementById("manual").addEventListener("input",e=>render(e.target.value));
// Web Speech
let rec=null,listening=false;
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const mic=document.getElementById("mic");
if(SR){
  rec=new SR();rec.lang="es-MX";rec.continuous=true;rec.interimResults=true;
  rec.onresult=e=>{let t="";for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;render(t);document.getElementById("manual").value=t;};
  rec.onend=()=>{if(listening)rec.start();};
}else{mic.textContent="Tu navegador no soporta voz — usa el campo de texto";mic.disabled=true;mic.style.background="#3a4655";}
mic.addEventListener("click",()=>{
  if(!rec)return;
  listening=!listening;
  if(listening){rec.start();mic.textContent="⏹ Escuchando… (toca para parar)";mic.classList.add("rec");}
  else{listening=false;rec.stop();mic.textContent="▶ Empezar a hablar";mic.classList.remove("rec");}
});
</script></body></html>
